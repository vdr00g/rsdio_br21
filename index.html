<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RSDIO — Post</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.16);
    --text: #f0f0f0;
    --muted: #666;
    --accent: #f0f0f0;
    --green: #1ed760;
    --red: #fc3c44;
    --blue: #4a90e2;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px 80px;
  }

  .app {
    width: 100%;
    max-width: 520px;
  }

  header {
    margin-bottom: 36px;
  }

  header h1 {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  header h1 span {
    color: var(--text);
  }

  .block {
    margin-bottom: 24px;
  }

  .block-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }

  .field {
    margin-bottom: 12px;
  }

  .field:last-child {
    margin-bottom: 0;
  }

  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input[type=text],
  input[type=password] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type=text]:focus,
  input[type=password]:focus {
    border-color: var(--border-hover);
  }

  input::placeholder {
    color: var(--muted);
  }

  .row3 {
    display: grid;
    grid-template-columns: 64px 1fr 80px;
    gap: 10px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 14px 0;
  }

  .url-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .url-row input {
    flex: 1;
    min-width: 0;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    letter-spacing: 0.05em;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    border: 1px solid transparent;
  }

  .badge-idle { color: var(--muted); border-color: var(--border); }
  .badge-loading { color: var(--blue); border-color: rgba(74,144,226,0.3); background: rgba(74,144,226,0.08); }
  .badge-ok { color: var(--green); border-color: rgba(30,215,96,0.3); background: rgba(30,215,96,0.08); }
  .badge-err { color: var(--red); border-color: rgba(252,60,68,0.3); background: rgba(252,60,68,0.08); }

  .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; display: inline-block; }

  .dot-spin {
    display: inline-block;
    width: 8px; height: 8px;
    border: 1.5px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    background: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .file-drop {
    border: 1px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    color: var(--muted);
    user-select: none;
  }

  .file-drop:hover,
  .file-drop.drag {
    border-color: var(--border-hover);
    background: var(--surface2);
  }

  .file-drop.has-file {
    border-style: solid;
    border-color: rgba(255,255,255,0.2);
    color: var(--text);
  }

  .file-size {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  .preview-caption {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 14px;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    min-height: 90px;
    border: 1px solid var(--border);
  }

  .tg-buttons {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .tg-btn {
    flex: 1;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    border: none;
    cursor: default;
  }

  .tg-btn-spotify { background: var(--green); color: #000; }
  .tg-btn-apple { background: var(--red); color: #fff; }

  .search-btn,
  .post-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    padding: 8px 14px;
    transition: border-color 0.15s, background 0.15s;
    letter-spacing: 0.03em;
  }

  .search-btn:hover,
  .post-btn:hover:not(:disabled) {
    border-color: var(--border-hover);
    background: var(--surface2);
  }

  .post-btn {
    width: 100%;
    padding: 11px;
    margin-top: 12px;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .post-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .result {
    margin-top: 10px;
    font-size: 12px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    display: none;
    border: 1px solid transparent;
  }

  .result-ok {
    display: block;
    color: var(--green);
    border-color: rgba(30,215,96,0.25);
    background: rgba(30,215,96,0.07);
  }

  .result-err {
    display: block;
    color: var(--red);
    border-color: rgba(252,60,68,0.25);
    background: rgba(252,60,68,0.07);
  }

  .config-toggle {
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    background: none;
    border: none;
    font-family: inherit;
    padding: 0;
    margin-bottom: 12px;
    display: inline-block;
    letter-spacing: 0.05em;
  }

  .config-toggle:hover { color: var(--text); }

  .config-section { display: none; }
  .config-section.open { display: block; }
</style>
</head>
<body>
<div class="app">

  <header>
    <h1>RSDIO <span>BR_2ONE</span> — post</h1>
  </header>

  <button class="config-toggle" onclick="toggleConfig()">telegram settings</button>
  <div class="config-section" id="configSection">
    <div class="block">
      <div class="block-label">Configuration</div>
      <div class="card">
        <div class="field">
          <label>Anthropic API key</label>
          <input type="password" id="anthropicKey" placeholder="sk-ant-..." oninput="save()" />
        </div>
        <div class="field">
          <label>Bot token</label>
          <input type="password" id="botToken" placeholder="123456:ABC-DEF..." oninput="save();updatePreview()" />
        </div>
        <div class="field">
          <label>Channel</label>
          <input type="text" id="channelId" placeholder="@rsdiobr_2one" oninput="save();updatePreview()" />
        </div>
      </div>
    </div>
  </div>

  <div class="block">
    <div class="block-label">Track</div>
    <div class="card">
      <div class="row3 field">
        <div>
          <label>No.</label>
          <input type="text" id="trackNum" placeholder="109" oninput="updatePreview()" />
        </div>
        <div>
          <label>Artist</label>
          <input type="text" id="artist" placeholder="BOP (feat. y/siR)" oninput="updatePreview()" />
        </div>
        <div>
          <label>Year</label>
          <input type="text" id="year" placeholder="2026" oninput="updatePreview()" />
        </div>
      </div>
      <div class="field">
        <label>Track name</label>
        <input type="text" id="trackName" placeholder="Matter of Fact" oninput="updatePreview()" />
      </div>
    </div>
  </div>

  <div class="block">
    <div class="block-label">Video</div>
    <div class="card">
      <div class="file-drop" id="fileDrop"
        onclick="document.getElementById('fileInput').click()"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="handleDrop(event)">
        <div id="fileLabel">click to select or drag & drop</div>
        <div class="file-size" id="fileSize"></div>
      </div>
      <input type="file" id="fileInput" accept="video/*" style="display:none" onchange="handleFile(this.files[0])" />
    </div>
  </div>

  <div class="block">
    <div class="block-label">Links</div>
    <div class="card">
      <div class="field">
        <label>Spotify</label>
        <div class="url-row">
          <input type="text" id="spotifyUrl" placeholder="auto-search or paste" oninput="updatePreview()" />
          <span class="badge badge-idle" id="spotifyBadge"><span class="dot"></span> idle</span>
        </div>
      </div>
      <div class="field">
        <label>Apple Music</label>
        <div class="url-row">
          <input type="text" id="appleUrl" placeholder="auto-search or paste" oninput="updatePreview()" />
          <span class="badge badge-idle" id="appleBadge"><span class="dot"></span> idle</span>
        </div>
      </div>
      <hr class="divider" />
      <button class="search-btn" onclick="searchLinks()">search with AI ↗</button>
    </div>
  </div>

  <div class="block">
    <div class="block-label">Preview</div>
    <div class="card">
      <div class="preview-caption" id="preview">fill in track details...</div>
      <div class="tg-buttons" id="tgBtns" style="display:none">
        <div class="tg-btn tg-btn-spotify">Spotify</div>
        <div class="tg-btn tg-btn-apple">Apple Music</div>
      </div>
      <button class="post-btn" id="postBtn" onclick="postToTelegram()" disabled>post to channel</button>
      <div class="result" id="resultBar"></div>
    </div>
  </div>

</div>

<script>
let selectedFile = null;

function toggleConfig() {
  const s = document.getElementById('configSection');
  const btn = document.querySelector('.config-toggle');
  s.classList.toggle('open');
  btn.textContent = s.classList.contains('open') ? 'hide settings' : 'telegram settings';
}

function save() {
  localStorage.setItem('tg_token', document.getElementById('botToken').value);
  localStorage.setItem('tg_channel', document.getElementById('channelId').value);
  localStorage.setItem('anthropic_key', document.getElementById('anthropicKey').value);
}

function load() {
  document.getElementById('botToken').value = localStorage.getItem('tg_token') || '';
  document.getElementById('channelId').value = localStorage.getItem('tg_channel') || '';
  document.getElementById('anthropicKey').value = localStorage.getItem('anthropic_key') || '';
}

function handleFile(file) {
  if (!file) return;
  selectedFile = file;
  const drop = document.getElementById('fileDrop');
  drop.classList.add('has-file');
  document.getElementById('fileLabel').textContent = file.name;
  document.getElementById('fileSize').textContent = (file.size / 1024 / 1024).toFixed(1) + ' MB';
  updatePreview();
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('fileDrop').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('video/')) handleFile(file);
}

function getCaption() {
  const num = document.getElementById('trackNum').value.trim();
  const artist = document.getElementById('artist').value.trim();
  const name = document.getElementById('trackName').value.trim();
  const year = document.getElementById('year').value.trim();
  if (!artist && !name) return '';
  const lines = [];
  if (num) { lines.push(num); lines.push(''); }
  if (artist) lines.push('artist: ' + artist);
  if (name) lines.push('track: ' + name);
  if (year) lines.push('year: ' + year);
  return lines.join('\n');
}

function updatePreview() {
  const caption = getCaption();
  const spotify = document.getElementById('spotifyUrl').value.trim();
  const apple = document.getElementById('appleUrl').value.trim();
  const preview = document.getElementById('preview');
  const tgBtns = document.getElementById('tgBtns');
  const postBtn = document.getElementById('postBtn');

  preview.textContent = caption || 'fill in track details...';
  tgBtns.style.display = (spotify || apple) ? 'flex' : 'none';

  const token = document.getElementById('botToken').value.trim();
  const channel = document.getElementById('channelId').value.trim();
  const artist = document.getElementById('artist').value.trim();
  const name = document.getElementById('trackName').value.trim();
  postBtn.disabled = !(artist && name && token && channel);
}

function setBadge(id, state, text) {
  const el = document.getElementById(id);
  el.className = 'badge badge-' + state;
  const cls = state === 'loading' ? 'dot-spin' : 'dot';
  el.innerHTML = '<span class="' + cls + '"></span> ' + text;
}

async function searchLinks() {
  const artist = document.getElementById('artist').value.trim();
  const name = document.getElementById('trackName').value.trim();
  const year = document.getElementById('year').value.trim();
  if (!artist || !name) { alert('Enter artist and track name first.'); return; }

  setBadge('spotifyBadge', 'loading', 'searching...');
  setBadge('appleBadge', 'loading', 'searching...');

  const apiKey = document.getElementById('anthropicKey').value.trim();
  if (!apiKey) { alert('Enter your Anthropic API key in settings first.'); setBadge('spotifyBadge','idle','idle'); setBadge('appleBadge','idle','idle'); return; }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-calls': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{
          role: 'user',
          content: `Find Spotify and Apple Music URLs for "${name}" by ${artist}${year ? ' (' + year + ')' : ''}. Return ONLY JSON, no other text: {"spotify":"...","apple":"..."}. Use null if not found.`
        }]
      })
    });

    const data = await res.json();
    const text = (data.content || []).map(i => i.text || '').join('');
    const match = text.match(/\{[\s\S]*?\}/);
    const parsed = JSON.parse(match ? match[0] : '{}');

    if (parsed.spotify) {
      document.getElementById('spotifyUrl').value = parsed.spotify;
      setBadge('spotifyBadge', 'ok', 'found');
    } else {
      setBadge('spotifyBadge', 'err', 'not found');
    }

    if (parsed.apple) {
      document.getElementById('appleUrl').value = parsed.apple;
      setBadge('appleBadge', 'ok', 'found');
    } else {
      setBadge('appleBadge', 'err', 'not found');
    }

    updatePreview();
  } catch (e) {
    setBadge('spotifyBadge', 'err', 'error');
    setBadge('appleBadge', 'err', 'error');
    console.error(e);
  }
}

async function postToTelegram() {
  const token = document.getElementById('botToken').value.trim();
  const channel = document.getElementById('channelId').value.trim();
  const caption = getCaption();
  const spotify = document.getElementById('spotifyUrl').value.trim();
  const apple = document.getElementById('appleUrl').value.trim();
  const resultBar = document.getElementById('resultBar');

  const row = [];
  if (spotify) row.push({ text: 'Spotify', url: spotify });
  if (apple) row.push({ text: 'Apple Music', url: apple });
  const reply_markup = row.length ? { inline_keyboard: [row] } : undefined;

  resultBar.className = 'result';
  resultBar.textContent = selectedFile ? 'uploading video...' : 'posting...';
  resultBar.style.display = 'block';

  try {
    let res;
    if (selectedFile) {
      const form = new FormData();
      form.append('chat_id', channel);
      form.append('video', selectedFile);
      form.append('caption', caption);
      if (reply_markup) form.append('reply_markup', JSON.stringify(reply_markup));
      res = await fetch(`https://api.telegram.org/bot${token}/sendVideo`, { method: 'POST', body: form });
    } else {
      res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: channel, text: caption, reply_markup })
      });
    }

    const json = await res.json();
    if (json.ok) {
      resultBar.className = 'result result-ok';
      resultBar.textContent = 'posted successfully.';
      selectedFile = null;
      document.getElementById('fileDrop').classList.remove('has-file');
      document.getElementById('fileLabel').textContent = 'click to select or drag & drop';
      document.getElementById('fileSize').textContent = '';
      document.getElementById('fileInput').value = '';
    } else {
      resultBar.className = 'result result-err';
      resultBar.textContent = 'telegram error: ' + (json.description || 'unknown');
    }
  } catch (e) {
    resultBar.className = 'result result-err';
    resultBar.textContent = 'network error — check token and channel id';
  }
}

load();
updatePreview();
</script>
</body>
</html>
